<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Yönlendirme - Durak 1</title>
    
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="config.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* A11y Yüksek Kontrastlı Bilgi Paneli */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background-color: rgba(0, 0, 0, 0.9);
            color: #FFFFFF;
            padding: 15px;
            border-radius: 12px;
            border: 3px solid #FF0000; /* Hedef bulunana kadar kırmızı */
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 1000;
            transition: border-color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* Hedef Bulunduğunda UI Yeşile Dönecek */
        #ui-panel.found {
            border-color: #00FF00;
        }

        /* Yükleme ve İzin Hata Ekranı */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            font-size: 1.2rem;
        }
        .spinner {
            border: 6px solid #f3f3f3; border-top: 6px solid #3498db;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text">Kamera başlatılıyor. Lütfen izin veriniz...</p>
    </div>

    <div id="ui-panel" role="alert" aria-live="assertive">
        Lütfen kamerayı duvardaki yönlendirme afişine (hedefe) doğrultun.
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./assets/targets.mind; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentStopId = "durak1";
            const targetDestId = NavigationState.getDestination();
            const uiPanel = document.getElementById("ui-panel");
            const loadingScreen = document.getElementById("loading-screen");
            const arTarget = document.getElementById("ar-target");

            // Eğer hedef seçilmemişse ana ekrana geri yolla
            if (!targetDestId) {
                window.location.href = "index.html";
                return;
            }

            // config.js'den geçerli durağın rota bilgilerini çek
            const routeData = NavConfig[currentStopId].destinations[targetDestId];

            if (!routeData) {
                uiPanel.innerText = "Hata: Bu duraktan seçilen hedefe rota bulunamadı.";
                return;
            }

            // --- 1. Dinamik AR Okunu Yarat ve Sahneye Ekle ---
            // Model yükleme hatalarından kaçınmak için MVP'de A-Frame primitive (koni) kullanıyoruz.
            // Asıl projede <a-image src="./assets/arrow.png"> veya <a-gltf-model> kullanabilirsin.
            const arrowEl = document.createElement('a-cone');
            arrowEl.setAttribute('radius-bottom', '0.5');
            arrowEl.setAttribute('radius-top', '0');
            arrowEl.setAttribute('height', '1.5');
            arrowEl.setAttribute('color', routeData.arrow.color);
            // config.js'den gelen konum ve rotasyon değerlerini ata (Yer düzlemine y=-1.5 hizala)
            arrowEl.setAttribute('position', routeData.arrow.position);
            arrowEl.setAttribute('rotation', routeData.arrow.rotation);
          
            arrowEl.setAttribute('material', 'opacity: 0.8; transparent: true;');
            
            arTarget.appendChild(arrowEl);

            // ---  Kamera İzin ve Yükleme Hata Yönetimi ---
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener('arReady', () => {
                loadingScreen.style.display = "none"; // Sistem hazır, yükleme ekranını gizle
            });
            sceneEl.addEventListener('arError', () => {
                document.getElementById("loading-text").innerText = "Kamera başlatılamadı. Lütfen tarayıcı izinlerini kontrol edin.";
                document.querySelector(".spinner").style.display = "none";
            });

            // ---  Mind-AR Hedef Bulundu / Kaybedildi Olayları (Event Listeners) ---
            let hasSpoken = false; // Sesi sadece ilk bulunduğunda çalmak için flag

            arTarget.addEventListener("targetFound", event => {
                // A11y: Görsel Uyarı
                uiPanel.classList.add("found");
                uiPanel.innerText = routeData.text;

                // A11y: İşitsel Uyarı (Text-to-Speech)
                if (!hasSpoken && 'speechSynthesis' in window) {
                    const speech = new SpeechSynthesisUtterance(routeData.audioText);
                    speech.lang = 'tr-TR';
                    speech.rate = 0.9; // Engelli bireyler için anlaşılırlığı artırmak adına biraz yavaşlatıldı
                    window.speechSynthesis.speak(speech);
                    hasSpoken = true;
                }
            });

            arTarget.addEventListener("targetLost", event => {
                uiPanel.classList.remove("found");
                uiPanel.innerText = "Hedef kaybedildi. Kamerayı afişe tekrar doğrultun.";
            });
        });
    </script>
</body>
</html>
