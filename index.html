<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hastane AR Navigasyon - Hedef Seçimi</title>
    <script src="config.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #FFFFFF;
            --btn-bg: #81D4FA; 
            --btn-hover: #4FC3F7;
            --btn-disabled: #424242;
            --text-disabled: #9E9E9E;
            --accent-color: #81D4FA;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { font-size: 1.8rem; text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        p.desc { font-size: 1rem; text-align: center; margin-bottom: 20px; color: #B0BEC5; }
        
        .dest-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; margin-bottom: 40px; }
        
        button.dest-btn {
            background-color: var(--btn-bg); color: #000; border: none; padding: 18px;
            font-size: 1.3rem; font-weight: bold; border-radius: 12px; cursor: pointer;
            transition: transform 0.2s; display: flex; align-items: center; justify-content: center;
        }
        button.dest-btn:active { transform: scale(0.98); }
        button.dest-btn.disabled { background-color: var(--btn-disabled); color: var(--text-disabled); cursor: not-allowed; }
        
        .icon { margin-right: 10px; }
        .badge { font-size: 0.7rem; background: #FF5252; color: white; padding: 2px 6px; border-radius: 8px; margin-left: auto; }
        .watermark { position: fixed; bottom: 5px; right: 10px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); pointer-events: none; z-index: 10000; }
    </style>
</head>
<body>

    <h1>Hastane Navigasyon</h1>
    <p class="desc">Gideceğiniz birimi seçin.</p>

    <div class="dest-grid">
        <button class="dest-btn" onclick="startNavigation('noroloji')"><span class="icon">🧠</span> Nöroloji</button>
        <button class="dest-btn" onclick="startNavigation('engelli_tuvaleti')"><span class="icon">♿</span> Engelli Tuvaleti</button>
        <button class="dest-btn" onclick="startNavigation('laboratuvar')"><span class="icon">🔬</span> Laboratuvar</button>
        <button class="dest-btn" onclick="startNavigation('danisma')"><span class="icon">ℹ️</span> Danışma</button>
        <button class="dest-btn disabled" disabled><span class="icon">👁️</span> Göz Polikliniği <span class="badge">Yakında</span></button>
    </div>

    <div class="watermark">by Arda24</div>

    <script>
        function startNavigation(destinationId) {
            localStorage.setItem('hastane_hedef', destinationId);
            window.location.href = "durak1.html"; 
        }
    </script>
</body>
</html>
