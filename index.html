<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Navigasyon - Durak 1</title>
    
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="config.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; }
        #overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        
        #top-navbar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px); color: white; padding: 15px;
            border-radius: 15px; text-align: center; font-weight: bold; font-size: 1.1rem;
            border-bottom: 3px solid #81D4FA; display: none;
        }

        #menu-container { position: absolute; top: 20px; right: 20px; display: none; pointer-events: auto; z-index: 2000; }
        .hamburger-btn { background: rgba(20, 20, 20, 0.9); border: 2px solid #81D4FA; color: white; border-radius: 8px; padding: 10px 15px; cursor: pointer; font-size: 1.5rem; }
        
        .dropdown-menu { display: none; position: absolute; top: 60px; right: 0; width: 220px; background: rgba(20, 20, 20, 0.95); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .dropdown-menu.show { display: block; }
        .menu-item { padding: 15px 20px; color: white; font-weight: bold; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.1); }
        .item-reached { color: #81D4FA; }
        .item-cancel { color: #ff5252; }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #121212; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; 
            padding: 20px; z-index: 2000; box-sizing: border-box; margin: 0;
        }

        .instruction-box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; border: 2px solid #81D4FA; width: 85%; max-width: 350px; text-align: center; }
        h2 { margin-top: 0; color: #81D4FA; }
        
        #start-ar-btn {
            display: block; background-color: #81D4FA; color: #000; font-size: 1.4rem; font-weight: bold;
            padding: 15px; border: none; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 20px;
        }

        .watermark { position: fixed; bottom: 5px; right: 10px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); pointer-events: none; z-index: 10000; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="instruction-box">
            <h2 id="intro-title">📍 Başlangıç</h2>
            <p id="intro-desc">Lütfen telefonu gideceğiniz yöne doğru düz tutun.</p>
            <button id="start-ar-btn">🚀 AR'yi Başlat</button>
        </div>
    </div>

    <div id="overlay-container">
        <div id="top-navbar"><span id="nav-instruction">Yükleniyor...</span></div>
        <div id="menu-container">
            <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
            <div class="dropdown-menu" id="dropdown-menu">
                <div class="menu-item item-reached" id="menu-action-btn" onclick="handleLegComplete()">↩️ Dönüşü Tamamladım</div>
                <div class="menu-item item-cancel" onclick="cancelNavigation()">❌ Rotayı İptal Et</div>
            </div>
        </div>
    </div>

    <a-scene webxr="referenceSpaceType: local-floor; requiredFeatures: local-floor, dom-overlay; overlayElement: #overlay-container;" vr-mode-ui="enabled: false"> 
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity id="route-container"></a-entity>
    </a-scene>

    <div class="watermark">by Arda24</div>

    <script>
        let currentLegIndex = 0; 
        let routeLegs = [];
        let sceneEl, routeContainer, actionBtn;

        function toggleMenu() { document.getElementById("dropdown-menu").classList.toggle("show"); }

        function handleLegComplete() {
            // AR'den çık, sıfırlama işlemi başlasın
            sceneEl.exitVR();
            toggleMenu();

            currentLegIndex++; // Sonraki bacağa geç

            if (currentLegIndex < routeLegs.length) {
                // Viraja geldik! Kullanıcıyı bilgilendir
                alert("Viraj noktasına varıldı. Lütfen şimdi sola dönün, yeni koridora düz bakın ve Tamam'a basıp AR'yi tekrar başlatın.");
                
                // Ekranı yeni bacağa göre ayarla
                document.getElementById("intro-title").innerText = `📍 Dönüş Noktası`;
                document.getElementById("intro-desc").innerText = `Yeni koridora düz bakıp AR'yi başlatın.`;
                document.getElementById("intro-screen").style.display = "flex";
                
                // Eğer son bacaktaysak butonu 'Hedefe Vardım' yap
                if (currentLegIndex === routeLegs.length - 1) {
                    actionBtn.innerText = "🎉 Hedefe Vardım";
                }
            } else {
                // Hedefe başarıyla varıldı
                alert("Tebrikler, hedefe ulaştınız!");
                localStorage.removeItem('hastane_hedef');
                window.location.href = "index.html";
            }
        }

        function cancelNavigation() {
            if (confirm("Rotayı iptal edip başa dönmek istiyor musunuz?")) {
                localStorage.removeItem('hastane_hedef');
                window.location.href = "index.html";
            }
        }

        // Mevcut bacağın oklarını çizer
        function drawCurrentLeg() {
            routeContainer.innerHTML = ""; // Eski okları temizle
            const legData = routeLegs[currentLegIndex];
            document.getElementById("nav-instruction").innerText = legData.instruction;

            // Kameranın mevcut yönünü ve pozisyonunu merkez al
            const camPos = document.querySelector('a-camera').getAttribute('position');
            const camRot = document.querySelector('a-camera').getAttribute('rotation');
            routeContainer.setAttribute('position', `${camPos.x} 0 ${camPos.z}`);
            routeContainer.setAttribute('rotation', `0 ${camRot.y} 0`);

            // Okları diz
            legData.path.forEach((point, index) => {
                const arrowEl = document.createElement('a-cone');
                arrowEl.setAttribute('radius-bottom', '0.15');
                arrowEl.setAttribute('height', '0.05');
                arrowEl.setAttribute('segments-radial', '4');
                arrowEl.setAttribute('color', legData.color); 
                arrowEl.setAttribute('position', point.pos);
                arrowEl.setAttribute('rotation', point.rot);
                arrowEl.setAttribute('material', 'opacity: 0.2; transparent: true;');
                arrowEl.setAttribute('animation', `property: material.opacity; from: 0.2; to: 1.0; dir: alternate; dur: 400; loop: true; delay: ${index * 150};`);
                routeContainer.appendChild(arrowEl);
            });

            if ('speechSynthesis' in window) {
                const speech = new SpeechSynthesisUtterance(legData.audioText);
                speech.lang = 'tr-TR';
                window.speechSynthesis.speak(speech);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const targetDestId = NavigationState.getDestination();
            sceneEl = document.querySelector('a-scene');
            routeContainer = document.getElementById("route-container");
            actionBtn = document.getElementById("menu-action-btn");

            if (!targetDestId) return window.location.href = "index.html";

            const routeData = NavConfig["durak1"].destinations[targetDestId];
            if (!routeData || !routeData.legs) return;
            
            routeLegs = routeData.legs;
            currentLegIndex = 0; 

            // Başlangıç için menü butonunu ayarla
            if (routeLegs.length > 1) {
                actionBtn.innerText = "↩️ Dönüşü Tamamladım";
            } else {
                actionBtn.innerText = "🎉 Hedefe Vardım";
            }

            document.getElementById("start-ar-btn").addEventListener('click', () => {
                if (navigator.xr) { sceneEl.enterAR(); } 
                else { alert("Cihazınız WebXR desteklemiyor."); }
            });

            sceneEl.addEventListener('enter-vr', () => {
                document.getElementById("intro-screen").style.display = "none";
                document.getElementById("top-navbar").style.display = "block";
                document.getElementById("menu-container").style.display = "block";
                
                // Zemin algılamasına fırsat vermek için ufak bir gecikme
                setTimeout(() => {
                    drawCurrentLeg();
                }, 500);
            });

            sceneEl.addEventListener('exit-vr', () => {
                document.getElementById("top-navbar").style.display = "none";
                document.getElementById("menu-container").style.display = "none";
                document.getElementById("dropdown-menu").classList.remove("show");
            });
        });
    </script>
</body>
</html>
