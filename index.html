<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hastane AR Navigasyon - Hedef Seçimi</title>
    <script src="config.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #FFFFFF;
            /* DEĞİŞİKLİK: Yeşil -> Baby Blue (#81D4FA) */
            --btn-bg: #81D4FA; 
            --btn-hover: #4FC3F7; /* Biraz daha koyu baby blue */
            --btn-disabled: #424242;
            --text-disabled: #9E9E9E;
            --accent-color: #81D4FA;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        p.desc { font-size: 1.2rem; text-align: center; margin-bottom: 30px; color: #B0BEC5; }
        
        .dest-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 50px; /* Filigran için boşluk */
        }
        
        button.dest-btn {
            background-color: var(--btn-bg);
            /* DEĞİŞİKLİK: Yazı rengi siyah oldu (baby blue üstünde daha iyi okunur) */
            color: #000; 
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(129, 212, 250, 0.3); /* Baby blue gölge */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button.dest-btn:hover, button.dest-btn:focus {
            background-color: var(--btn-hover);
            transform: scale(1.02);
            outline: 3px solid #FFFFFF; 
        }

        button.dest-btn.disabled {
            background-color: var(--btn-disabled);
            color: var(--text-disabled);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            border: 1px solid #555;
        }
        
        .icon { margin-right: 10px; }
        .badge { font-size: 0.8rem; background: #FF5252; color: white; padding: 3px 8px; border-radius: 10px; margin-left: auto; }

        
        .watermark {
            position: fixed;
            bottom: 5px;
            right: 10px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3); /* Çok az belli */
            pointer-events: none;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <h1>Nereye Gitmek İstiyorsunuz?</h1>
    <p class="desc">Lütfen hedefinizi seçin, ardından AR kamerasını başlatın.</p>

    <div class="dest-grid" role="group" aria-label="Varış Noktaları">
        <button class="dest-btn" onclick="startNavigation('noroloji')" aria-label="Nöroloji Birimi">
            <span class="icon">🧠</span> Nöroloji
        </button>
        <button class="dest-btn disabled" disabled aria-label="Engelli Tuvaleti (Yapım Aşamasında)">
            <span class="icon">♿</span> Engelli Tuvaleti <span class="badge">Yakında</span>
        </button>
        <button class="dest-btn disabled" disabled aria-label="Laboratuvar (Yapım Aşamasında)">
            <span class="icon">🔬</span> Laboratuvar <span class="badge">Yakında</span>
        </button>
    </div>

    <div class="watermark">by Arda24</div>

    <script>
        function startNavigation(destinationId) {
            NavigationState.setDestination(destinationId);
            window.location.href = "durak1.html"; 
        }
    </script>
</body>
</html>
